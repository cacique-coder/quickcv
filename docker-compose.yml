services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: quillcv_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quillcv_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
