<div class="wizard-progress">
    <div class="wizard-steps">
        <div class="wizard-step {% if step >= 1 %}{% if step == 1 %}active{% else %}completed{% endif %}{% endif %}">
            <span class="step-num">{% if step > 1 %}&#10003;{% else %}1{% endif %}</span>
            <span class="step-label">Country</span>
        </div>
        <div class="step-line {% if step > 1 %}completed{% endif %}"></div>
        <div class="wizard-step {% if step >= 2 %}{% if step == 2 %}active{% else %}completed{% endif %}{% endif %}">
            <span class="step-num">{% if step > 2 %}&#10003;{% else %}2{% endif %}</span>
            <span class="step-label">Your Details</span>
        </div>
        <div class="step-line {% if step > 2 %}completed{% endif %}"></div>
        <div class="wizard-step {% if step >= 3 %}{% if step == 3 %}active{% else %}completed{% endif %}{% endif %}">
            <span class="step-num">{% if step > 3 %}&#10003;{% else %}3{% endif %}</span>
            <span class="step-label">Documents</span>
        </div>
        <div class="step-line {% if step > 3 %}completed{% endif %}"></div>
        <div class="wizard-step {% if step >= 4 %}{% if step == 4 %}active{% else %}completed{% endif %}{% endif %}">
            <span class="step-num">{% if step > 4 %}&#10003;{% else %}4{% endif %}</span>
            <span class="step-label">Template</span>
        </div>
        <div class="step-line {% if step > 4 %}completed{% endif %}"></div>
        <div class="wizard-step {% if step == 5 %}active{% endif %}">
            <span class="step-num">5</span>
            <span class="step-label">Generate</span>
        </div>
    </div>
</div>
