<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>{% block subject %}QuillCV{% endblock %}</title>
  <!--[if mso]>
  <noscript>
    <xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml>
  </noscript>
  <![endif]-->
  <style>
    /* Reset */
    * { box-sizing: border-box; }
    body, table, td, a { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; }
    table, td { mso-table-lspace: 0pt; mso-table-rspace: 0pt; }
    img { -ms-interpolation-mode: bicubic; border: 0; outline: none; text-decoration: none; }
    body { margin: 0; padding: 0; background-color: #f0eeea; }

    /* Typography */
    body, td, th { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; }

    /* Layout */
    .email-wrapper {
      width: 100%;
      background-color: #f0eeea;
      padding: 32px 16px;
    }
    .email-container {
      max-width: 560px;
      margin: 0 auto;
      background-color: #ffffff;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #dbd8d2;
    }

    /* Header */
    .email-header {
      background-color: #2c2c3a;
      padding: 28px 36px;
      text-align: left;
    }
    .email-header a {
      text-decoration: none;
      color: #ffffff;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }
    .email-header .logo-accent {
      color: #6c63ff;
    }

    /* Body */
    .email-body {
      padding: 36px 36px 28px;
      color: #2c2c3a;
      font-size: 15px;
      line-height: 1.6;
    }
    .email-body h1 {
      font-size: 22px;
      font-weight: 700;
      color: #2c2c3a;
      margin: 0 0 16px;
      letter-spacing: -0.3px;
    }
    .email-body p {
      margin: 0 0 16px;
      color: #3a3a4a;
    }
    .email-body p:last-of-type {
      margin-bottom: 0;
    }

    /* CTA button */
    .btn {
      display: inline-block;
      background-color: #5b52e0;
      color: #ffffff !important;
      text-decoration: none;
      padding: 13px 28px;
      border-radius: 6px;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.1px;
      margin: 20px 0;
    }
    .btn:hover { background-color: #4a42c0; }

    /* Info block */
    .info-box {
      background-color: #f7f6f3;
      border: 1px solid #dbd8d2;
      border-radius: 6px;
      padding: 16px 20px;
      margin: 20px 0;
      font-size: 14px;
      color: #3a3a4a;
    }
    .info-box strong { color: #2c2c3a; }

    /* Divider */
    .divider {
      border: none;
      border-top: 1px solid #dbd8d2;
      margin: 24px 0;
    }

    /* Footer */
    .email-footer {
      background-color: #f7f6f3;
      border-top: 1px solid #dbd8d2;
      padding: 20px 36px;
      font-size: 12px;
      color: #71717f;
      line-height: 1.5;
    }
    .email-footer a { color: #5b52e0; text-decoration: none; }
    .email-footer a:hover { text-decoration: underline; }

    /* Responsive */
    @media only screen and (max-width: 600px) {
      .email-body { padding: 24px 20px 20px; }
      .email-header { padding: 20px 20px; }
      .email-footer { padding: 16px 20px; }
    }
  </style>
</head>
<body>
<div class="email-wrapper">
  <div class="email-container">

    <!-- Header -->
    <div class="email-header">
      <a href="https://quillcv.com">
        <span class="logo-accent">&#9654;</span> QuillCV
      </a>
    </div>

    <!-- Body -->
    <div class="email-body">
      {% block body %}{% endblock %}
    </div>

    <!-- Footer -->
    <div class="email-footer">
      <p>
        This is a transactional email from QuillCV.<br>
        You're receiving this because you have an account at
        <a href="https://quillcv.com">quillcv.com</a>.
      </p>
      <p>
        QuillCV &bull; 123 Example Street, Sydney NSW 2000, Australia<br>
        <a href="https://quillcv.com/privacy">Privacy Policy</a>
        &bull;
        <a href="mailto:support@quillcv.com">support@quillcv.com</a>
        &bull;
        <a href="https://quillcv.com/unsubscribe?email={{ email | urlencode }}">Unsubscribe</a>
      </p>
    </div>

  </div>
</div>
</body>
</html>
